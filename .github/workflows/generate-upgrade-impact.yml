name: Generate upgrade impact data

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag to analyze, for example v0.159.23"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        run: |
          TAG_NAME="${{ inputs.tag || github.ref_name }}"
          if ! echo "$TAG_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Skipping non-stable release tag: $TAG_NAME"
            echo "stable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "stable=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        if: steps.release.outputs.stable == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        if: steps.release.outputs.stable == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: upgrade-impact/package-lock.json

      - name: Install dependencies
        if: steps.release.outputs.stable == 'true'
        run: npm ci
        working-directory: upgrade-impact

      - name: Generate upgrade impact data
        if: steps.release.outputs.stable == 'true'
        run: npm run generate -- --tag "${{ steps.release.outputs.tag }}"
        working-directory: upgrade-impact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate upgrade impact data
        if: steps.release.outputs.stable == 'true'
        run: npm run validate
        working-directory: upgrade-impact

      - name: Open upgrade impact PR
        if: steps.release.outputs.stable == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/upgrade-impact-${{ steps.release.outputs.tag }}
          base: main
          title: "chore: add upgrade impact for ${{ steps.release.outputs.tag }}"
          commit-message: "chore: add upgrade impact for ${{ steps.release.outputs.tag }}"
          body: |
            Generated self-hosted upgrade impact data for `${{ steps.release.outputs.tag }}`.

            Review the generated JSON for self-hosted upgrade accuracy before merging.
