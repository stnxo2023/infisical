name: Issue Product Labeler

on:
  issues:
    types: [opened]

jobs:
  add-product-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add product label based on issue form selection
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const productLabels = {
              'Platform (General/Multiple Products)': 'product:platform',
              'Secret Manager': 'product:secret-manager',
              'Certificate Manager (PKI)': 'product:pki',
              'KMS': 'product:kms',
              'Secret Scanning': 'product:secret-scanning',
              'Privileged Access Manager (PAM)': 'product:pam'
            };

            const platformLabels = {
              'Infisical Cloud': 'platform:cloud',
              'Self-hosted': 'platform:self-hosted'
            };

            const labelsToAdd = [];

            for (const [product, label] of Object.entries(productLabels)) {
              if (body.includes(product)) {
                labelsToAdd.push(label);
                break;
              }
            }

            for (const [platform, label] of Object.entries(platformLabels)) {
              if (body.includes(platform)) {
                labelsToAdd.push(label);
                break;
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')}`);
            }
